<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contract Details - SecureWork</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Space Grotesk', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          animation: {
            'blob': 'blob 7s infinite',
          },
          keyframes: {
            blob: {
              '0%': { transform: 'translate(0px, 0px) scale(1)' },
              '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
              '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
              '100%': { transform: 'translate(0px, 0px) scale(1)' },
            }
          }
        }
      }
    }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body class="font-sans antialiased bg-[#0B0F19] text-slate-300 selection:bg-emerald-500/30">

    <div class="fixed top-[-10%] left-[-10%] w-96 h-96 bg-emerald-600 rounded-full mix-blend-multiply filter blur-[128px] opacity-10 animate-blob pointer-events-none z-0"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-96 h-96 bg-blue-600 rounded-full mix-blend-multiply filter blur-[128px] opacity-10 animate-blob pointer-events-none z-0" style="animation-delay: 2s;"></div>

    <div class="flex min-h-screen relative z-10">
        <aside class="w-64 bg-[#06090F]/80 backdrop-blur-xl border-r border-slate-800/50 fixed h-full z-40">
            <div class="flex flex-col h-full">
                <div class="p-6 border-b border-slate-800/50">
                    <div class="flex items-center space-x-3 group cursor-pointer">
                        <div class="w-10 h-10 bg-gradient-to-br from-emerald-400 to-emerald-600 rounded-xl flex items-center justify-center shadow-lg shadow-emerald-500/20">
                            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                            </svg>
                        </div>
                        <span class="text-xl font-display font-bold text-white tracking-tight">SecureWork</span>
                    </div>
                </div>

                <nav class="flex-1 p-4 space-y-2 mt-4">
                    <a href="dashboard.html" class="flex items-center space-x-3 px-4 py-3.5 text-slate-400 hover:bg-slate-800/50 hover:text-white rounded-xl font-medium transition-all">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                        <span>Dashboard</span>
                    </a>
                    <a href="contracts.html" class="flex items-center space-x-3 px-4 py-3.5 text-slate-400 hover:bg-slate-800/50 hover:text-white rounded-xl font-medium transition-all">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                        <span>Contracts</span>
                    </a>
                    <a href="wallet.html" class="flex items-center space-x-3 px-4 py-3.5 text-slate-400 hover:bg-slate-800/50 hover:text-white rounded-xl font-medium transition-all">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg>
                        <span>Wallet Hub</span>
                    </a>
                    <a href="settings.html" class="flex items-center space-x-3 px-4 py-3.5 text-slate-400 hover:bg-slate-800/50 hover:text-white rounded-xl font-medium transition-all">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                        <span>System Settings</span>
                    </a>
                </nav>

                <div class="p-4 border-t border-slate-800/50">
                    <button onclick="AuthService.logout()" class="flex items-center justify-center space-x-3 px-4 py-3 text-rose-400 hover:bg-rose-500/10 border border-transparent hover:border-rose-500/20 rounded-xl font-medium w-full transition-all">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                        <span>Terminate Session</span>
                    </button>
                </div>
            </div>
        </aside>

        <main class="flex-1 ml-64 p-8 lg:p-12">
            <a href="dashboard.html" class="inline-flex items-center text-slate-400 hover:text-white mb-8 font-medium transition-colors">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                Return to Dashboard
            </a>

            <div id="contractHeader" class="bg-slate-900/60 backdrop-blur-xl border border-slate-700/50 rounded-3xl p-8 mb-10 border-t-4 border-t-emerald-500 animate-pulse shadow-2xl">
                <div class="h-6 bg-slate-800 rounded w-1/4 mb-4"></div>
                <div class="h-10 bg-slate-800 rounded w-1/2"></div>
            </div>

            <div class="grid lg:grid-cols-3 gap-8">
                <div class="lg:col-span-2 space-y-8">
                    
                    <div id="publishedView" class="hidden space-y-8">
                        
                        <div data-role="client" class="hidden space-y-8">
                            <div class="bg-slate-900/60 backdrop-blur-xl border border-slate-700/50 rounded-3xl p-8 shadow-xl">
                                <h2 class="text-2xl font-display font-bold text-white mb-4">Technical Specifications</h2>
                                <p id="clientJobDesc" class="text-slate-400 leading-relaxed"></p>
                            </div>
                            
                            <div>
                                <h2 class="text-2xl font-display font-bold text-white mb-6 flex items-center">
                                    <svg class="w-6 h-6 mr-3 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                                    Submitted Proposals
                                </h2>
                                <div id="applicationsList" class="space-y-6">
                                    </div>
                            </div>
                        </div>

                        <div data-role="freelancer" class="hidden">
                            <div class="flex border-b border-slate-800 mb-8">
                                <button class="tab-btn px-8 py-4 font-bold text-emerald-400 border-b-2 border-emerald-500 transition-all" data-target="job-desc-content">System Overview</button>
                                <button class="tab-btn px-8 py-4 font-bold text-slate-500 border-b-2 border-transparent hover:text-slate-300 transition-all" data-target="apply-content">Submit Proposal</button>
                            </div>

                            <div id="job-desc-content" class="tab-content bg-slate-900/60 backdrop-blur-xl border border-slate-700/50 rounded-3xl p-8 shadow-xl">
                                <h2 class="text-2xl font-display font-bold text-white mb-4">Project Requirements</h2>
                                <p id="freelancerJobDesc" class="text-slate-400 leading-relaxed"></p>
                            </div>

                            <div id="apply-content" class="tab-content hidden bg-slate-900/60 backdrop-blur-xl border border-slate-700/50 rounded-3xl p-8 shadow-xl">
                                <form id="proposalForm" class="space-y-8">
                                    <div>
                                        <label class="block text-sm font-bold text-slate-300 mb-3">Cover Letter / Implementation Plan</label>
                                        <textarea id="coverLetter" required rows="5" class="w-full px-5 py-4 bg-slate-950/50 border border-slate-700/50 rounded-xl text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500 transition-all resize-none" placeholder="Detail your architecture approach and why you are suited for this deployment..."></textarea>
                                    </div>
                                    
                                    <div class="pt-4 border-t border-slate-800">
                                        <div class="flex justify-between items-center mb-6">
                                            <label class="block text-sm font-bold text-slate-300">Proposed Milestone Architecture</label>
                                        </div>
                                        <div id="milestoneRows" class="space-y-4">
                                            <div class="flex gap-4 items-start milestone-row group">
                                                <div class="flex-1">
                                                    <input type="text" name="m_title" placeholder="E.g., Database Schema & Auth" required class="w-full px-4 py-3 bg-slate-950/50 border border-slate-700/50 rounded-xl text-white placeholder-slate-600 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500/50 transition-all">
                                                </div>
                                                <div class="w-36 relative">
                                                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                                        <span class="text-emerald-500 font-bold">$</span>
                                                    </div>
                                                    <input type="number" name="m_amount" placeholder="Amount" required class="w-full pl-8 pr-4 py-3 bg-slate-950/50 border border-slate-700/50 rounded-xl text-white placeholder-slate-600 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500/50 transition-all">
                                                </div>
                                                <div class="w-44">
                                                    <input type="date" name="m_date" required class="w-full px-4 py-3 bg-slate-950/50 border border-slate-700/50 rounded-xl text-slate-300 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500/50 transition-all [color-scheme:dark]">
                                                </div>
                                            </div>
                                        </div>
                                        
                                        <button type="button" onclick="addMilestoneRow()" class="mt-6 text-sm font-bold text-emerald-400 hover:text-emerald-300 flex items-center transition-colors bg-emerald-500/10 px-4 py-2 rounded-lg border border-emerald-500/20 hover:border-emerald-500/40">
                                            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/></svg>
                                            Add Another Phase
                                        </button>
                                    </div>

                                    <button type="submit" class="w-full py-4 bg-gradient-to-r from-emerald-500 to-emerald-600 text-white rounded-xl hover:from-emerald-400 hover:to-emerald-500 transition-all font-bold shadow-[0_0_20px_-5px_rgba(16,185,129,0.4)] mt-4">
                                        Transmit Proposal
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>

                    <div id="activeView" class="hidden space-y-8">
                        <div class="bg-slate-900/60 backdrop-blur-xl border border-slate-700/50 rounded-3xl p-8 shadow-xl">
                            <h2 class="text-2xl font-display font-bold text-white mb-8 flex items-center">
                                <svg class="w-6 h-6 mr-3 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                                Milestone Trajectory
                            </h2>
                            <div id="milestoneTimeline" class="space-y-6 relative before:absolute before:inset-0 before:ml-5 before:-translate-x-px md:before:mx-auto md:before:translate-x-0 before:h-full before:w-0.5 before:bg-gradient-to-b before:from-transparent before:via-slate-700 before:to-transparent">
                                </div>
                        </div>
                    </div>
                </div>

                <div class="space-y-8">
                    <div id="chartSection" class="bg-slate-900/60 backdrop-blur-xl border border-slate-700/50 rounded-3xl p-8 shadow-xl hidden">
                        <h2 class="text-xl font-display font-bold text-white mb-6">Financial Allocation</h2>
                        <div class="relative h-64">
                            <canvas id="budgetChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script>
        if (!AuthService.isAuthenticated()) window.location.href = 'login.html';

        let currentContract = null;
        const urlParams = new URLSearchParams(window.location.search);
        const contractId = urlParams.get('id');

        document.addEventListener('DOMContentLoaded', async () => {
            AppUtils.renderUI();
            UIActions.initTabs();
            
            if(!contractId) {
                alert("Critical: No contract parameters provided.");
                window.location.href = 'dashboard.html';
                return;
            }

            await loadContractData();
        });

        async function loadContractData() {
            try {
                currentContract = await AppUtils.apiCall(`/api/contracts/${contractId}/`, 'GET');
                renderHeader();
                
                if (currentContract.status === 'published') {
                    document.getElementById('publishedView').classList.remove('hidden');
                    document.getElementById('clientJobDesc').textContent = currentContract.description;
                    document.getElementById('freelancerJobDesc').textContent = currentContract.description;
                    
                    if(localStorage.getItem('securework_role') === 'client') {
                        loadApplications();
                    } else {
                        bindProposalForm();
                    }
                } else {
                    document.getElementById('activeView').classList.remove('hidden');
                    document.getElementById('chartSection').classList.remove('hidden');
                    renderTimeline();
                    renderChart();
                }
            } catch (err) {
                console.error(err);
                document.getElementById('contractHeader').innerHTML = `<div class="text-rose-400 font-bold bg-rose-500/10 p-4 rounded-xl border border-rose-500/20">Data Retrieval Failed.</div>`;
            }
        }

        // ==========================================
        // UI INJECTION TEMPLATES (UPDATED FOR DARK MODE)
        // ==========================================

        function renderHeader() {
            const shortId = currentContract.id.replace(/\D/g, '').substring(0, 3).padStart(3, '0');
            const budget = parseFloat(currentContract.total_budget || 0).toLocaleString('en-US', {minimumFractionDigits: 2});
            
            // Premium dark mode status badges
            let statusClass = currentContract.status === 'active' ? 'bg-blue-500/10 text-blue-400 border-blue-500/20 shadow-[0_0_10px_rgba(59,130,246,0.2)]' : 
                              currentContract.status === 'completed' ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20 shadow-[0_0_10px_rgba(16,185,129,0.2)]' : 
                              'bg-yellow-500/10 text-yellow-400 border-yellow-500/20 shadow-[0_0_10px_rgba(234,179,8,0.2)]';

            document.getElementById('contractHeader').classList.remove('animate-pulse');
            document.getElementById('contractHeader').innerHTML = `
                <div class="flex flex-col md:flex-row md:items-start justify-between">
                    <div>
                        <div class="flex items-center space-x-4 mb-3">
                            <span class="text-sm font-mono font-bold text-slate-500">#SW-${shortId}</span>
                            <span class="px-3 py-1 border rounded-full text-xs font-bold uppercase tracking-wider ${statusClass}">${currentContract.status}</span>
                        </div>
                        <h1 class="text-3xl font-display font-bold text-white mb-3">${currentContract.title}</h1>
                        <div class="inline-flex items-center text-sm font-medium px-3 py-1 bg-slate-800 border border-slate-700 rounded-lg text-slate-400">
                            <svg class="w-4 h-4 mr-2 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                            Counterpart: <span class="text-white ml-1">${currentContract.counterpart_name || 'Pending Handshake'}</span>
                        </div>
                    </div>
                    <div class="mt-6 md:mt-0 text-right bg-slate-950/50 p-4 rounded-2xl border border-slate-800">
                        <div class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Total Allocation</div>
                        <div class="text-4xl font-mono font-black text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400">$${budget}</div>
                    </div>
                </div>
            `;
        }

        async function loadApplications() {
            const apps = await AppUtils.apiCall(`/api/applications/?contract=${contractId}`, 'GET');
            const container = document.getElementById('applicationsList');
            
            if(!apps || apps.length === 0) {
                container.innerHTML = `
                    <div class="text-slate-500 text-center p-8 bg-slate-950/50 border border-slate-800 rounded-2xl border-dashed">
                        No proposals received in the network yet.
                    </div>`;
                return;
            }

            container.innerHTML = apps.map(app => {
                const totalProp = app.proposed_milestones.reduce((sum, m) => sum + parseFloat(m.amount), 0);
                const msHtml = app.proposed_milestones.map(m => `
                    <div class="flex justify-between items-center bg-slate-950/80 p-3 border-b border-slate-800 last:border-0 hover:bg-slate-900 transition-colors">
                        <span class="text-sm text-slate-300 font-medium">${m.title}</span>
                        <span class="text-sm font-mono font-bold text-emerald-400">$${parseFloat(m.amount).toLocaleString()}</span>
                    </div>
                `).join('');

                return `
                <div class="bg-slate-800/40 border border-slate-700/50 rounded-2xl p-6 mb-6 hover:border-emerald-500/30 transition-all">
                    <div class="flex justify-between items-start mb-4">
                        <h3 class="text-lg font-display font-bold text-white flex items-center">
                            <div class="w-8 h-8 bg-slate-700 rounded-lg flex items-center justify-center mr-3 text-xs font-mono text-slate-300 border border-slate-600">ID</div>
                            Proposal #${app.id.substring(0,8)}
                        </h3>
                        <div class="text-right font-mono font-bold text-emerald-400 bg-emerald-500/10 px-3 py-1 rounded-lg border border-emerald-500/20">$${totalProp.toLocaleString()} Total</div>
                    </div>
                    
                    <div class="mb-5 relative">
                        <div class="absolute left-0 top-0 w-1 h-full bg-slate-700 rounded-l-lg"></div>
                        <p class="text-sm text-slate-400 bg-slate-950/50 p-4 pl-5 rounded-lg leading-relaxed">${app.cover_letter}</p>
                    </div>

                    <div class="mb-6 rounded-xl border border-slate-700/50 overflow-hidden shadow-inner">
                        <div class="bg-slate-800/80 px-4 py-2 border-b border-slate-700/50 text-xs font-bold text-slate-400 uppercase tracking-wider">Proposed Architecture</div>
                        ${msHtml}
                    </div>
                    <button onclick="ProposalActions.acceptProposal('${app.id}')" class="w-full py-3 bg-gradient-to-r from-emerald-500 to-emerald-600 text-white rounded-xl hover:from-emerald-400 hover:to-emerald-500 font-bold shadow-lg shadow-emerald-500/20 transition-all transform hover:-translate-y-0.5">
                        Accept Proposal & Initialize Smart Contract
                    </button>
                </div>`;
            }).join('');
        }

        function addMilestoneRow() {
            const html = `
                <div class="flex gap-4 items-start milestone-row mt-4 group relative">
                    <div class="flex-1"><input type="text" name="m_title" placeholder="Description" required class="w-full px-4 py-3 bg-slate-950/50 border border-slate-700/50 rounded-xl text-white placeholder-slate-600 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500/50 transition-all"></div>
                    <div class="w-36 relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <span class="text-emerald-500 font-bold">$</span>
                        </div>
                        <input type="number" name="m_amount" placeholder="Amount" required class="w-full pl-8 pr-4 py-3 bg-slate-950/50 border border-slate-700/50 rounded-xl text-white placeholder-slate-600 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500/50 transition-all">
                    </div>
                    <div class="w-44"><input type="date" name="m_date" required class="w-full px-4 py-3 bg-slate-950/50 border border-slate-700/50 rounded-xl text-slate-300 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500/50 transition-all [color-scheme:dark]"></div>
                    <button type="button" onclick="this.parentElement.remove()" class="p-3 text-slate-500 hover:text-rose-400 hover:bg-rose-500/10 rounded-xl transition-all border border-transparent hover:border-rose-500/20">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                    </button>
                </div>`;
            document.getElementById('milestoneRows').insertAdjacentHTML('beforeend', html);
        }

        function renderTimeline() {
            const container = document.getElementById('milestoneTimeline');
            const role = localStorage.getItem('securework_role');
            
            if(!currentContract.milestones || currentContract.milestones.length === 0) {
                container.innerHTML = `<p class="text-slate-500 italic">No milestones established in the block.</p>`;
                return;
            }

            container.innerHTML = currentContract.milestones.map((m, index) => {
                let actionHtml = '';
                
                // Smart Button Styling based on action type
                const fundBtn = `<button onclick="actionMilestone('${m.id}', 'fund')" class="px-5 py-2 bg-blue-500/10 border border-blue-500/30 text-blue-400 rounded-lg hover:bg-blue-500/20 hover:border-blue-500/50 font-bold text-sm transition-all shadow-[0_0_15px_-3px_rgba(59,130,246,0.2)]">Fund Escrow Vault</button>`;
                const releaseBtn = `<button onclick="actionMilestone('${m.id}', 'release')" class="px-5 py-2 bg-emerald-500/10 border border-emerald-500/30 text-emerald-400 rounded-lg hover:bg-emerald-500/20 hover:border-emerald-500/50 font-bold text-sm transition-all shadow-[0_0_15px_-3px_rgba(16,185,129,0.2)] flex items-center ml-auto"><svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg> Approve & Release Funds</button>`;
                const submitBtn = `<button onclick="actionMilestone('${m.id}', 'submit')" class="px-5 py-2 bg-purple-500/10 border border-purple-500/30 text-purple-400 rounded-lg hover:bg-purple-500/20 hover:border-purple-500/50 font-bold text-sm transition-all shadow-[0_0_15px_-3px_rgba(168,85,247,0.2)] flex items-center ml-auto"><svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg> Push Deliverable</button>`;

                if(role === 'client') {
                    if(m.status === 'pending') actionHtml = fundBtn;
                    if(m.status === 'submitted') actionHtml = releaseBtn;
                } else if (role === 'freelancer') {
                    if(m.status === 'funded') actionHtml = submitBtn;
                }

                // Node coloring
                const isComplete = m.status === 'approved';
                const nodeClass = isComplete ? 'bg-emerald-500 text-white shadow-[0_0_15px_rgba(16,185,129,0.5)] border-transparent' : 'bg-slate-900 border-2 border-slate-700 text-slate-500';

                // Status Pill formatting
                let statusColor = 'text-slate-400 bg-slate-800 border-slate-700';
                if(m.status === 'funded') statusColor = 'text-blue-400 bg-blue-500/10 border-blue-500/20';
                if(m.status === 'submitted') statusColor = 'text-purple-400 bg-purple-500/10 border-purple-500/20';
                if(m.status === 'approved') statusColor = 'text-emerald-400 bg-emerald-500/10 border-emerald-500/20';

                return `
                <div class="relative flex items-start group">
                    <div class="absolute left-0 w-10 h-10 flex items-center justify-center">
                        <div class="w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm z-10 ${nodeClass} transition-colors duration-300">
                            ${isComplete ? '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>' : index + 1}
                        </div>
                    </div>
                    
                    <div class="ml-14 flex-1 bg-slate-800/40 border border-slate-700/50 rounded-2xl p-5 hover:bg-slate-800/60 hover:border-slate-600 transition-all">
                        <div class="flex justify-between items-start mb-3">
                            <div>
                                <h4 class="text-lg font-bold text-white mb-1 group-hover:text-emerald-300 transition-colors">${m.title}</h4>
                                <div class="text-xs font-mono text-slate-500 flex items-center">
                                    <svg class="w-3 h-3 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                                    Deadline: ${m.due_date}
                                </div>
                            </div>
                            <div class="text-right">
                                <div class="text-xl font-mono font-bold text-white tracking-tight">$${parseFloat(m.amount).toLocaleString()}</div>
                                <div class="mt-2 inline-block px-3 py-1 text-[10px] font-bold uppercase tracking-wider rounded border ${statusColor}">
                                    ${m.status}
                                </div>
                            </div>
                        </div>
                        <div class="mt-4 pt-4 border-t border-slate-700/50 text-right min-h-[40px] flex items-center justify-end">
                            ${actionHtml || '<span class="text-xs text-slate-500 italic font-mono bg-slate-900 px-3 py-1 rounded">No network actions required</span>'}
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function bindProposalForm() {
            document.getElementById('proposalForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const coverLetter = document.getElementById('coverLetter').value;
                const rows = document.querySelectorAll('.milestone-row');
                const milestones = Array.from(rows).map(row => ({
                    title: row.querySelector('input[name="m_title"]').value,
                    amount: row.querySelector('input[name="m_amount"]').value,
                    due_date: row.querySelector('input[name="m_date"]').value
                }));

                try {
                    await ProposalActions.submitProposal(contractId, coverLetter, milestones);
                    alert("Proposal injected into network successfully.");
                    window.location.href = 'dashboard.html';
                } catch(e) {
                    alert("System error injecting proposal.");
                }
            });
        }

        async function actionMilestone(id, action) {
            try {
                let msg = "";
                if(action === 'fund') {
                    await AppUtils.apiCall(`/api/milestones/${id}/fund/`, 'POST');
                msg = "Escrow Vault funded. Payment secured.";
                }
                if(action === 'submit') {
                    await AppUtils.apiCall(`/api/milestones/${id}/submit/`, 'POST', {submission_url: 'Submitted via UI'});
                    msg = "Deliverable pushed to network. Pending approval.";
                }
                if(action === 'release') {
                    await AppUtils.apiCall(`/api/release-funds/${id}/`, 'POST');
                    msg = "Funds released to freelancer balance.";
                }
        
                ToastService.show(msg, "success");

        // Small delay to allow the user to see the success toast before refresh
                setTimeout(async () => {
            // Re-fetch contract to check if it's finished
                    const updated = await AppUtils.apiCall(`/api/contracts/${contractId}/`, 'GET');
                    if (updated.status === 'completed') {
                        ToastService.show("CONTRACT COMPLETED: All milestones finalized.", "info");
                        setTimeout(() => window.location.reload(), 2000);
                    } else {
                        window.location.reload();
                    }
                }, 1500);

            } catch (e) {
                ToastService.show("Action rejected. Verify ledger state.", "error");
            }
        }

        function renderChart() {
            let paid = 0, escrowed = 0, unfunded = 0;
            currentContract.milestones.forEach(m => {
                const amt = parseFloat(m.amount);
                if(m.status === 'approved') paid += amt;
                else if(m.status === 'funded' || m.status === 'submitted') escrowed += amt;
                else unfunded += amt;
            });

            new Chart(document.getElementById('budgetChart'), {
                type: 'doughnut',
                data: {
                    labels: ['Cleared', 'In Escrow', 'Unfunded'],
                    datasets: [{
                        data: [paid, escrowed, unfunded],
                        backgroundColor: ['#10B981', '#3B82F6', '#1e293b'], // Emerald, Blue, Slate-800
                        borderColor: '#0f172a', // Slate-900 stroke between slices
                        borderWidth: 2,
                        hoverOffset: 4
                    }]
                },
                options: { 
                    cutout: '75%', 
                    plugins: { 
                        legend: { 
                            position: 'bottom',
                            labels: {
                                color: '#94a3b8', // Slate-400
                                font: { family: 'Space Grotesk', size: 13, weight: 'bold' },
                                padding: 20,
                                usePointStyle: true
                            }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(15, 23, 42, 0.95)',
                            titleColor: '#f8fafc',
                            bodyColor: '#cbd5e1',
                            borderColor: 'rgba(51, 65, 85, 0.5)',
                            borderWidth: 1,
                            padding: 12,
                            displayColors: true,
                            callbacks: {
                                label: function(context) { return ' $' + context.parsed.toLocaleString(); }
                            }
                        }
                    } 
                }
            });
        }
    </script>
</body>

</html>
