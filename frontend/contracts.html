<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Work - SecureWork</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Space Grotesk', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          animation: {
            'blob': 'blob 7s infinite',
          },
          keyframes: {
            blob: {
              '0%': { transform: 'translate(0px, 0px) scale(1)' },
              '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
              '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
              '100%': { transform: 'translate(0px, 0px) scale(1)' },
            }
          }
        }
      }
    }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body class="font-sans antialiased bg-[#0B0F19] text-slate-300 selection:bg-emerald-500/30">

    <div class="fixed top-[-10%] left-[-10%] w-96 h-96 bg-emerald-600 rounded-full mix-blend-multiply filter blur-[128px] opacity-10 animate-blob pointer-events-none z-0"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-96 h-96 bg-cyan-600 rounded-full mix-blend-multiply filter blur-[128px] opacity-10 animate-blob pointer-events-none z-0" style="animation-delay: 2s;"></div>

    <div class="flex min-h-screen relative z-10">
        <aside class="w-64 bg-[#06090F]/80 backdrop-blur-xl border-r border-slate-800/50 fixed h-full z-40">
            <div class="flex flex-col h-full">
                <div class="p-6 border-b border-slate-800/50">
                    <div class="flex items-center space-x-3 group cursor-pointer">
                        <div class="w-10 h-10 bg-gradient-to-br from-emerald-400 to-emerald-600 rounded-xl flex items-center justify-center shadow-lg shadow-emerald-500/20">
                            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                            </svg>
                        </div>
                        <span class="text-xl font-display font-bold text-white tracking-tight">SecureWork</span>
                    </div>
                </div>

                <nav class="flex-1 p-4 space-y-2 mt-4">
                    <a href="dashboard.html" class="flex items-center space-x-3 px-4 py-3.5 text-slate-400 hover:bg-slate-800/50 hover:text-white rounded-xl font-medium transition-all">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                        <span>Dashboard</span>
                    </a>
                    <a href="contracts.html" class="flex items-center space-x-3 px-4 py-3.5 bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 rounded-xl font-medium transition-all shadow-[inset_0_0_20px_rgba(16,185,129,0.05)]">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                        <span>Contracts</span>
                    </a>
                    <a href="wallet.html" class="flex items-center space-x-3 px-4 py-3.5 text-slate-400 hover:bg-slate-800/50 hover:text-white rounded-xl font-medium transition-all">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg>
                        <span>Wallet Hub</span>
                    </a>
                    <a href="settings.html" class="flex items-center space-x-3 px-4 py-3.5 text-slate-400 hover:bg-slate-800/50 hover:text-white rounded-xl font-medium transition-all">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                        <span>System Settings</span>
                    </a>
                </nav>

                <div class="p-4 border-t border-slate-800/50">
                    <button onclick="AuthService.logout()" class="flex items-center justify-center space-x-3 px-4 py-3 text-rose-400 hover:bg-rose-500/10 border border-transparent hover:border-rose-500/20 rounded-xl font-medium w-full transition-all">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                        <span>Terminate Session</span>
                    </button>
                </div>
            </div>
        </aside>

        <main class="flex-1 ml-64 p-8 lg:p-12 relative z-10">
            <div class="mb-10">
                <h1 class="text-4xl font-display font-bold text-white mb-2 tracking-tight">Contract Marketplace</h1>
                <p class="text-slate-400">Browse available infrastructure projects and submit operational proposals.</p>
            </div>

            <div class="bg-slate-900/60 backdrop-blur-xl rounded-3xl p-5 mb-10 flex flex-col md:flex-row gap-4 border border-slate-700/50 shadow-2xl relative overflow-hidden group">
                <div class="absolute top-0 right-0 w-64 h-full bg-gradient-to-l from-emerald-500/5 to-transparent pointer-events-none"></div>
                
                <div class="flex-1 relative z-10">
                    <svg class="w-5 h-5 absolute left-4 top-3.5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                    </svg>
                    <input type="text" id="searchInput" placeholder="Search by keywords or tech stack..." class="w-full pl-12 pr-5 py-3 bg-slate-950/50 border border-slate-700/50 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500 transition-all font-medium">
                </div>
                <div class="flex gap-4 z-10">
                    <select id="budgetFilter" class="px-5 py-3 bg-slate-950/50 border border-slate-700/50 text-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500 transition-all font-medium appearance-none cursor-pointer">
                        <option value="" class="bg-slate-900">Any Budget Allocation</option>
                        <option value="low" class="bg-slate-900">Under $1,000</option>
                        <option value="medium" class="bg-slate-900">$1,000 - $5,000</option>
                        <option value="high" class="bg-slate-900">$5,000+</option>
                    </select>
                    <button id="queryBtn" class="px-8 py-3 bg-gradient-to-r from-emerald-500 to-emerald-600 text-white rounded-xl hover:from-emerald-400 hover:to-emerald-500 transition-all font-bold shadow-[0_0_20px_-5px_rgba(16,185,129,0.4)]">
                        Query
                    </button>
                </div>
            </div>

            <div id="availableJobsContainer" class="grid grid-cols-1 xl:grid-cols-2 2xl:grid-cols-3 gap-6">
                </div>
        </main>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script>
        if (!AuthService.isAuthenticated()) {
            window.location.href = 'login.html';
        }

        // Global variable to store fetched contracts so we don't have to hit the API every time we filter
        let allPublishedContracts = [];

        document.addEventListener('DOMContentLoaded', async () => {
            if(typeof AppUtils !== 'undefined') AppUtils.renderUI();
            
            try {
                // Fetch all contracts accessible to the user
                const contracts = await AppUtils.apiCall('/contracts/', 'GET');
                
                // Store only published contracts globally
                allPublishedContracts = contracts.filter(c => c.status === 'published');

                // Initial render
                renderContractsList(allPublishedContracts);

                // Wire up event listeners for live filtering
                document.getElementById('searchInput').addEventListener('input', applyFilters); // Live typing
                document.getElementById('budgetFilter').addEventListener('change', applyFilters); // Dropdown change
                document.getElementById('queryBtn').addEventListener('click', applyFilters); // Button click

            } catch (error) {
                console.error('Failed to load jobs:', error);
                document.getElementById('availableJobsContainer').innerHTML = `
                    <div class="col-span-full text-center py-12 px-6 text-rose-400 bg-rose-500/10 rounded-3xl border border-rose-500/20 font-bold shadow-2xl backdrop-blur-xl">
                        Network Error: Failed to retrieve active contracts from the infrastructure.
                    </div>`;
            }
        });

        // The Filtering Logic
        function applyFilters() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const budgetCategory = document.getElementById('budgetFilter').value;

            const filteredContracts = allPublishedContracts.filter(contract => {
                // 1. Search Filter (checks title, description, and client name)
                const matchesSearch = 
                    contract.title.toLowerCase().includes(searchTerm) || 
                    contract.description.toLowerCase().includes(searchTerm) || 
                    (contract.counterpart_name && contract.counterpart_name.toLowerCase().includes(searchTerm));

                // 2. Budget Filter
                const budget = parseFloat(contract.total_budget || 0);
                let matchesBudget = true;
                
                if (budgetCategory === 'low') matchesBudget = budget < 1000;
                else if (budgetCategory === 'medium') matchesBudget = budget >= 1000 && budget <= 5000;
                else if (budgetCategory === 'high') matchesBudget = budget > 5000;

                return matchesSearch && matchesBudget;
            });

            // Re-render the UI with the filtered list
            renderContractsList(filteredContracts);
        }

        // The UI Rendering Logic
        function renderContractsList(contractsToRender) {
            const container = document.getElementById('availableJobsContainer');

            if (contractsToRender.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full text-center py-16 px-6 bg-slate-900/60 backdrop-blur-xl border border-slate-700/50 rounded-3xl shadow-2xl">
                        <div class="w-20 h-20 bg-slate-800 rounded-full flex items-center justify-center mx-auto mb-6">
                            <svg class="w-10 h-10 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/></svg>
                        </div>
                        <h3 class="text-2xl font-display font-bold text-white mb-2">No matching contracts found.</h3>
                        <p class="text-slate-400 max-w-md mx-auto">Try adjusting your search keywords or budget filters to find active deployments.</p>
                    </div>`;
                return;
            }

            container.innerHTML = contractsToRender.map(contract => {
                const shortId = contract.id.replace(/\D/g, '').substring(0, 3).padStart(3, '0');
                const budgetVal = parseFloat(contract.total_budget || 0);
                
                return `
                    <div class="bg-slate-900/60 backdrop-blur-xl border border-slate-700/50 rounded-3xl shadow-xl p-8 hover:border-emerald-500/50 transition-all duration-300 flex flex-col group relative overflow-hidden">
                        <div class="absolute top-0 right-0 w-32 h-32 bg-emerald-500/5 rounded-full blur-2xl group-hover:bg-emerald-500/10 transition-all"></div>
                        
                        <div class="relative z-10 flex-1 flex flex-col">
                            <div class="flex justify-between items-start mb-5">
                                <div>
                                    <span class="text-xs font-mono font-bold text-slate-500 uppercase tracking-wider mb-2 block group-hover:text-emerald-400 transition-colors">#SW-${shortId}</span>
                                    <h3 class="text-xl font-display font-bold text-white leading-tight mb-3">${contract.title}</h3>
                                    <div class="inline-flex items-center px-3 py-1 bg-slate-800 border border-slate-700 rounded-full text-xs font-medium text-slate-400">
                                        <svg class="w-3.5 h-3.5 mr-1.5 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                                        Client: ${contract.counterpart_name || 'Verified Organization'}
                                    </div>
                                </div>
                            </div>
                            
                            <p class="text-slate-400 text-sm mb-8 flex-1 line-clamp-3 leading-relaxed">${contract.description}</p>
                            
                            <div class="pt-6 border-t border-slate-700/50 flex items-center justify-between mt-auto">
                                <div>
                                    <div class="text-xs text-slate-500 uppercase font-bold tracking-wider mb-1">Total Allocation</div>
                                    <div class="text-2xl font-mono font-bold text-white tracking-tight">$${budgetVal.toLocaleString('en-US', {minimumFractionDigits: 2})}</div>
                                </div>
                                <a href="contract-detail.html?id=${contract.id}" class="px-5 py-2.5 bg-emerald-500/10 text-emerald-400 hover:bg-emerald-500/20 rounded-xl font-bold text-sm transition-all border border-emerald-500/20 hover:border-emerald-500/40 shadow-[0_0_15px_-3px_rgba(16,185,129,0.1)] flex items-center group-hover:-translate-y-0.5">
                                    Inspect
                                    <svg class="w-4 h-4 ml-1.5 opacity-0 group-hover:opacity-100 transition-opacity transform -translate-x-2 group-hover:translate-x-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                                </a>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
    </script>
</body>

</html>
